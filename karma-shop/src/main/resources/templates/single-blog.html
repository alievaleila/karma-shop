<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorate="~{layout}">
<head>
    <title>Home</title>
</head>

<body>
<div layout:fragment="content">

    <!-- Start Banner Area -->
    <section class="banner-area organic-breadcrumb">
        <div class="container">
            <div class="breadcrumb-banner d-flex flex-wrap align-items-center justify-content-end">
                <div class="col-first">
                    <h1>Blog Page</h1>
                    <nav class="d-flex align-items-center">
                        <a href="index.html">Home<span class="lnr lnr-arrow-right"></span></a>
                        <a href="category.html">Blog</a>
                    </nav>
                </div>
            </div>
        </div>
    </section>
    <!-- End Banner Area -->

    <!--================Blog Area =================-->
    <section class="blog_area single-post-area section_gap">
        <div class="container">
            <div class="row">
                <div class="col-lg-8 posts-list">
                    <div class="single-post row">
                        <div class="col-lg-12">
                            <div class="feature-img">
                                <img class="img-fluid" th:src="${blog.imageUrl}" src="/front/img/blog/feature-img1.jpg" alt="">
                            </div>
                        </div>
                        <div class="col-lg-3  col-md-3">
                            <div class="blog_info text-right">
                                <div class="post_tag">
                                    <a href="#" th:each="category : ${blog.categories}" th:text="${category}">Category</a>
                                </div>
                                <ul class="blog_meta list">
                                    <li><a href="#" th:text="${blog.authorName}">Author Name<i class="lnr lnr-user"></i></a></li>
                                    <li><a href="#" th:text="${#temporals.format(blog.publishDate, 'dd MMM, yyyy')}">Date<i class="lnr lnr-calendar-full"></i></a></li>
                                    <li><a href="#" th:text="${blog.views}">Views<i class="lnr lnr-eye"></i></a></li>
                                    <li><a href="#" th:text="${blog.comments}">Comments<i class="lnr lnr-bubble"></i></a></li>
                                </ul>
                                <ul class="social-links">
                                    <li><a href="#"><i class="fa fa-facebook"></i></a></li>
                                    <li><a href="#"><i class="fa fa-twitter"></i></a></li>
                                    <li><a href="#"><i class="fa fa-github"></i></a></li>
                                    <li><a href="#"><i class="fa fa-behance"></i></a></li>
                                </ul>
                            </div>
                        </div>
                        <div class="col-lg-9 col-md-9 blog_details">
                            <h2 th:text="${blog.title}">Blog Title</h2>
                            <p class="excert" th:text="${blog.description}">Blog description</p>
                            <div th:utext="${blog.content}">Blog content</div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>
    <!--================Blog Area =================-->
</div>
</body>
</html>
