<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorate="~{layout}">

<head>
    <title>Home</title>
</head>

<body>
<div layout:fragment="content">

    <!-- Start Banner Area -->
    <section class="banner-area organic-breadcrumb">
        <div class="container">
            <div class="breadcrumb-banner d-flex flex-wrap align-items-center justify-content-end">
                <div class="col-first">
                    <h1>Product Details Page</h1>
                    <nav class="d-flex align-items-center">
                        <a th:href="@{/}">Home<span class="lnr lnr-arrow-right"></span></a>
                        <a th:href="@{/category}">Shop<span class="lnr lnr-arrow-right"></span></a>
                        <a href="#">Product Details</a>
                    </nav>
                </div>
            </div>
        </div>
    </section>
    <!-- End Banner Area -->

    <!--================Single Product Area =================-->
    <div class="product_image_area">
        <div class="container">
            <div class="row s_product_inner">
                <div class="col-lg-6">
                    <div class="s_product_img">
                        <img class="img-fluid" th:src="@{${product.imageUrl}}" alt=""
                             style="max-height: 500px; object-fit: contain; width: 100%;">
                    </div>
                </div>
                <div class="col-lg-5 offset-lg-1">
                    <div class="s_product_text">
                        <h3 th:text="${product.name}">Product Name</h3>
                        <h2 th:text="${product.discountPrice != null ? '$' + product.discountPrice : '$' + product.price}">$0</h2>
                        <h6 class="l-through" th:if="${product.discountPrice != null}"
                            th:text="${'$' + product.price}">$0</h6>

                        <ul class="list">
                            <li>
                                <a class="active" href="#">
                                    <span>Category</span> :
                                    <span th:text="${product.categoryName}">Category</span>
                                </a>
                            </li>
                            <li>
                                <a href="#"><span>Brand</span> :
                                    <span th:text="${product.brandName}">Brand</span>
                                </a>
                            </li>
                            <li>
                                <a href="#"><span>Color</span> :
                                    <span th:text="${product.colorName}">Color</span>
                                </a>
                            </li>

                        </ul>
                        <p th:text="${product.description}">Description</p>
                        <div class="product_count">
                            <label for="qty">Quantity:</label>
                            <input type="text" name="qty" id="sst" maxlength="12" value="1" title="Quantity:" class="input-text qty">
                            <button onclick="var result = document.getElementById('sst'); var sst = result.value; if( !isNaN( sst )) result.value++;return false;"
                                    class="increase items-count" type="button"><i class="lnr lnr-chevron-up"></i></button>
                            <button onclick="var result = document.getElementById('sst'); var sst = result.value; if( !isNaN( sst ) &amp;&amp; sst > 0 ) result.value--;return false;"
                                    class="reduced items-count" type="button"><i class="lnr lnr-chevron-down"></i></button>
                        </div>
                        <div class="card_area d-flex align-items-center">
                            <form th:action="@{/cart/add}" method="post" style="display: inline;">
                                <input type="hidden" name="productId" th:value="${product.id}" />
                                <button type="submit" class="primary-btn" style="border: none; background: none; cursor: pointer; padding: 0;">Səbətə əlavə et</button>
                            </form>
                            <form th:action="@{/wishlist/add}" method="post" style="display: inline;">
                                <input type="hidden" name="productId" th:value="${product.id}" />
                                <button type="submit" class="icon_btn" style="border: none; cursor: pointer;">
                                    <i class="lnr lnr lnr-heart"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!--================End Single Product Area =================-->

    <!--================Product Description Area =================-->
    <section class="product_description_area">
    </section>
    <!--================End Product Description Area =================-->

</div>
</body>
</html>
